<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GScript</title>

<style>
body {
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

h1 {
    text-align:center;
    font-size:60px;
    color:red;
    margin-top:100px;
    text-shadow:0 0 20px red;
}

.section {
    margin:40px;
    padding:30px;
    background:#111;
    border-radius:15px;
}

.code {
    background:black;
    padding:20px;
    border-radius:10px;
    font-family:monospace;
    color:#00ff88;
}

nav {
    position:fixed;
    width:100%;
    background:black;
    padding:15px;
}

nav a {
    color:white;
    margin:15px;
    text-decoration:none;
}

nav a:hover {
    color:red;
}
</style>
</head>

<body>

<nav>
<a href="#ex">Пример</a>
<a href="#doc">Документация</a>
</nav>

<h1>🔥 GScript 🔥</h1>

<div id="ex" class="section">
<h2>Пример</h2>

<div class="code">
player.hp = 40

when player.hp < 50 {
    say "LOW HP!"
    spawn Enemy
}

damage player 20
heal player
move player forward
</div>

</div>

<div id="doc" class="section">
<h2>Команды</h2>

<div class="code">
set hp 100
spawn Enemy
move player forward
heal player
damage player 20
say "Hello"
</div>

</div>

</body>
</html>
